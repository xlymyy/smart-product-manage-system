<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        .error{color:red;text-align:center;}
    </style>
</head>
<body style="width:400px;margin:100px auto">
<h2 align="center">智慧商品系统登录</h2>
<!-- 登录失败提示 -->
<p th:if="${param.error}" class="error">账号或密码错误，请重新输入</p>
<!-- 退出登录提示 -->
<p th:if="${param.logout}" style="color:green;text-align:center;">已安全退出</p>
<form th:action="@{/login}" method="post">
    <div style="margin:10px 0">账号：<input type="text" name="username" required></div>
    <div style="margin:10px 0">密码：<input type="password" name="password" required></div>
    <div style="margin:10px 0;text-align:center;">
        <button type="submit">登录</button>
    </div>
</form>
</body>
</html>
