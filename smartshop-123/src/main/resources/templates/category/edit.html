<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑分类</title>
</head>
<body>
<h2>编辑分类</h2>
<form th:action="@{/category/update}" method="post">
    <!-- 新增可编辑ID输入框，替换原来的hidden隐藏域 -->
    <div style="margin:10px 0;">
        分类ID：
        <input type="number" name="id" th:value="${cat.id}" required min="1">
    </div>
    <div style="margin:10px 0;">
        分类名称：
        <input type="text" name="name" th:value="${cat.name}" required>
    </div>
    <div style="margin:10px 0;">
        分类描述：
        <textarea name="descp" rows="4" th:text="${cat.descp}"></textarea>
    </div>
    <button type="submit">保存修改</button>
</form>
<br>
<a th:href="@{/category/list}">返回列表</a>
</body>
</html>
