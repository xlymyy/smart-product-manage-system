<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>智慧商品管理系统</title>
    <style>
        *{margin:0;padding:0}
        .header{height:60px;background:#0066cc;color:#fff;line-height:60px;padding-left:20px;font-size:22px;}
        .container{display:flex;height:calc(100vh - 60px);}
        .left{width:200px;background:#333;color:#fff;padding-top:20px}
        .left a{display:block;color:#fff;padding:12px 20px;text-decoration:none}
        .left a:hover{background:#0066cc}
        iframe{flex:1;border:none}
    </style>
</head>
<body>
<div class="header">智慧商品信息管理系统
    <span style="float:right;margin-right:30px" sec:authentication="name">欢迎</span>
    <a href="/logout" style="color:#fff;margin-left:20px">退出登录</a>
</div>
<div class="container">
    <div class="left">
        <a href="/welcome" target="mainFrame">首页欢迎</a>
        <a href="/product/list" target="mainFrame">商品管理</a>
        <div sec:authorize="hasRole('admin')">
            <a href="/category/list" target="mainFrame">分类管理</a>
        </div>
    </div>
    <iframe name="mainFrame" src="/welcome"></iframe>
</div>
</body>
</html>
